site_name: fangs-doc
site_description: Public build log & architecture for the fangs homelab
site_url: https://caleb-wrobel.github.io/fangs-doc/
repo_url: https://github.com/Caleb-Wrobel/fangs-doc
theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.top
    - search.highlight
    - search.share
    - content.code.annotate
    - toc.integrate
plugins:
  - search
  - git-revision-date-localized:
      enable_creation_date: true
      fallback_to_build_date: true
  - git-authors

markdown_extensions:
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

nav:
  - Home: index.md
  - Context: context.md
  - Roadmap: roadmap.md
  - Contributing: CONTRIBUTING.md
  - Architecture:
      - Overview: architecture/overview.md
      - Networking: architecture/networking.md
      - NAS/Caching: architecture/nas-caching.md
      - Observability: architecture/observability.md
      - Local AI: architecture/local-ai.md
      - Data Layer: architecture/data-layer.md
      - Onboarding: architecture/onboarding.md
      - TLS Proxy: architecture/tls-proxy.md
  - Build Log:
